appId: com.darcyjoseph.dollar
productName: dollar
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tailwind.config.js,postcss.config.js}'
mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  category: public.app-category.finance
  identity: null
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Finance
